apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  namespace: vcare
  name: vcare-frontend
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: vcare-frontend
  minReplicas: 20
  maxReplicas: 20
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80
